/* ══ 매장 설정 ══ */
const STORES = [
  { id:"미플",    label:"미플보드게임",      badge:{bg:"#FEF3C7",color:"#92400E"} },
  { id:"아카이브", label:"보드게임 아카이브", badge:{bg:"#DBEAFE",color:"#1E40AF"} },
];

/* ══ 직원 목록 ★ 여기서 수정 ★ ══ */
const STAFF = [
  { id:"staff1", name:"직원1", color:"#7C3AED" },
  { id:"staff2", name:"직원2", color:"#0369A1" },
  { id:"staff3", name:"직원3", color:"#059669" },
  { id:"staff4", name:"직원4", color:"#DC2626" },
];

/* ══ helpers ══ */
function uid(){return typeof crypto!=="undefined"&&crypto.randomUUID?crypto.randomUUID():`r-${Date.now()}-${Math.random().toString(16).slice(2)}`;}
function pad(n){return String(n).padStart(2,"0");}
function toLocalISO(d){d=d||new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function dateStr(d){d=d||new Date();return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;}
function fmtDate(iso){if(!iso)return"";const d=new Date(iso);return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())}`;}
function fmtTime(iso){if(!iso)return"";const d=new Date(iso);return `${pad(d.getHours())}:${pad(d.getMinutes())}`;}
function fmtDateTime(iso){if(!iso)return"";return `${fmtDate(iso)} ${fmtTime(iso)}`;}
function calcHours(s,e){if(!s||!e)return null;const d=(new Date(e)-new Date(s))/3600000;return d>0?d:null;}
function fmtHours(h){if(h==null)return"—";const hr=Math.floor(h),min=Math.round((h-hr)*60);return min===0?`${hr}시간`:`${hr}시간 ${min}분`;}
function storeBadge(sid){const s=STORES.find(x=>x.id===sid);return s?s.badge:{bg:"#F3F4F6",color:"#374151"};}
function staffColor(sid){const s=STAFF.find(x=>x.id===sid);return s?s.color:"#6B7280";}
function staffName(sid){const s=STAFF.find(x=>x.id===sid);return s?s.name:sid||"—";}

/* ══ 공휴일 캐시 ══ */
const holidayCache = {};
async function fetchHolidays(year){
  if(holidayCache[year]!==undefined)return holidayCache[year];
  try{
    // Google Calendar API (한국 공휴일, API키 불필요 iCal)
    const url=`https://www.googleapis.com/calendar/v3/calendars/ko.south_korea%23holiday%40group.v.calendar.google.com/events?key=AIzaSyB6_HCHduvd5dxQEr2-2yXPDUoJmXHOZ4c&timeMin=${year}-01-01T00:00:00Z&timeMax=${year}-12-31T23:59:59Z&singleEvents=true&maxResults=50`;
    const r=await fetch(url);
    if(!r.ok)throw new Error();
    const d=await r.json();
    const map={};
    (d.items||[]).forEach(ev=>{
      const dt=(ev.start?.date||"").slice(0,10);
      if(dt)map[dt]=ev.summary||"공휴일";
    });
    holidayCache[year]=map;
    return map;
  }catch(e){
    // fallback: 고정 공휴일만
    const fixed={
      [`${year}-01-01`]:"신정",
      [`${year}-03-01`]:"삼일절",
      [`${year}-05-05`]:"어린이날",
      [`${year}-06-06`]:"현충일",
      [`${year}-08-15`]:"광복절",
      [`${year}-10-03`]:"개천절",
      [`${year}-10-09`]:"한글날",
      [`${year}-12-25`]:"크리스마스",
    };
    holidayCache[year]=fixed;
    return fixed;
  }
}

const CSS=`
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

/* ══════════════════════════════════
   WORK MODAL (날짜 클릭 or 수정)
══════════════════════════════════ */
const DOW_LABELS=["일","월","화","수","목","금","토"];

// 날짜 문자열(YYYY-MM-DD)에서 요일(0=일) 반환
function getDow(ds){return new Date(ds+"T12:00:00").getDay();}

// startDate~endDate 사이에서 특정 요일들에 해당하는 날짜 배열 반환
function getDatesForDows(startDs, endDs, dows){
  const result=[];
  const cur=new Date(startDs+"T12:00:00");
  const end=new Date(endDs+"T12:00:00");
  while(cur<=end){
    if(dows.includes(cur.getDay()))result.push(dateStr(cur));
    cur.setDate(cur.getDate()+1);
  }
  return result;
}

function WorkModal({record, defaultDate, onClose, onSave, onDelete}){
  const isEdit=!!record;
  const now=new Date();
  const initDate=defaultDate||dateStr(now);

  const [form,setForm]=useState(isEdit?{
    staffId:record.staffId, storeId:record.storeId,
    startAt:record.startAt?toLocalISO(new Date(record.startAt)):"",
    endAt:record.endAt?toLocalISO(new Date(record.endAt)):"",
    memo:record.memo||"",
  }:{
    staffId:STAFF[0]?.id||"",
    storeId:STORES[0]?.id||"",
    startAt:`${initDate}T14:00`,
    endAt:`${initDate}T23:00`,
    memo:"",
  });

  // 반복 설정 (신규 등록 전용)
  const initDow=getDow(initDate);
  const [repeat,setRepeat]=useState(false);
  const [repeatDows,setRepeatDows]=useState([initDow]); // 선택된 요일 배열
  const [repeatEnd,setRepeatEnd]=useState(()=>{
    // 기본 종료일: 4주 후
    const d=new Date(initDate+"T12:00:00");
    d.setDate(d.getDate()+27);
    return dateStr(d);
  });
  const [previewCount,setPreviewCount]=useState(0);

  // 반복 미리보기 날짜 수 계산
  useEffect(()=>{
    if(!repeat||repeatDows.length===0){setPreviewCount(0);return;}
    const startDs=form.startAt.slice(0,10)||initDate;
    const dates=getDatesForDows(startDs,repeatEnd,repeatDows);
    setPreviewCount(dates.length);
  },[repeat,repeatDows,repeatEnd,form.startAt]);

  const [err,setErr]=useState({});
  const [saving,setSaving]=useState(false);
  const hours=calcHours(form.startAt,form.endAt);

  function toggleDow(d){
    setRepeatDows(prev=>prev.includes(d)?prev.filter(x=>x!==d):[...prev,d].sort());
  }

  async function submit(e){
    e.preventDefault();
    const er={};
    if(!form.staffId)er.staffId="직원을 선택해주세요.";
    if(!form.storeId)er.storeId="매장을 선택해주세요.";
    if(!form.startAt)er.startAt="출근 시간을 입력해주세요.";
    if(form.endAt&&form.startAt&&new Date(form.endAt)<=new Date(form.startAt))er.endAt="종료 시간이 시작보다 빠릅니다.";
    if(repeat&&repeatDows.length===0)er.repeat="반복할 요일을 선택해주세요.";
    if(Object.keys(er).length){setErr(er);return;}
    setSaving(true);

    const startTime=form.startAt.slice(11); // "14:00"
    const endTime=form.endAt?form.endAt.slice(11):"";

    if(!isEdit&&repeat&&repeatDows.length>0){
      // 반복 등록: 해당 요일들의 날짜마다 각각 생성
      const startDs=form.startAt.slice(0,10);
      const dates=getDatesForDows(startDs,repeatEnd,repeatDows);
      // 시작 날짜가 선택 요일에 없으면 첫 날짜만 단일 등록
      const allDates=dates.length>0?dates:[startDs];
      const rows=allDates.map(ds=>({
        id:uid(),
        staffId:form.staffId, storeId:form.storeId,
        startAt:new Date(`${ds}T${startTime}`).toISOString(),
        endAt:endTime?new Date(`${ds}T${endTime}`).toISOString():null,
        memo:form.memo,
      }));
      await onSave(rows); // 배열로 전달
    } else {
      await onSave([{
        id:isEdit?record.id:uid(),
        staffId:form.staffId, storeId:form.storeId,
        startAt:new Date(form.startAt).toISOString(),
        endAt:form.endAt?new Date(form.endAt).toISOString():null,
        memo:form.memo,
      }]);
    }
    setSaving(false);
  }

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <form className="modal-box fade-in" onSubmit={submit} style={{padding:24,color:"#1E293B"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h2 style={{fontSize:17,fontWeight:700}}>{isEdit?"근무 기록 수정":"근무 일정 등록"}</h2>
          <button type="button" onClick={onClose} style={{background:"none",border:"none",cursor:"pointer"}}><X size={18}/></button>
        </div>

        {/* 직원 */}
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:6}}>직원 <span style={{color:"#EF4444"}}>*</span></label>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {STAFF.map(s=>(
              <button key={s.id} type="button" onClick={()=>setForm({...form,staffId:s.id})}
                style={{padding:"6px 14px",borderRadius:999,fontSize:13,fontWeight:600,
                  border:`2px solid ${form.staffId===s.id?s.color:"#E2E8F0"}`,
                  background:form.staffId===s.id?s.color:"#fff",
                  color:form.staffId===s.id?"#fff":"#374151",cursor:"pointer",transition:"all .12s"}}>
                {s.name}
              </button>
            ))}
          </div>
          {err.staffId&&<p style={{fontSize:12,color:"#EF4444",marginTop:4}}>{err.staffId}</p>}
        </div>

        {/* 매장 */}
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:6}}>매장 <span style={{color:"#EF4444"}}>*</span></label>
          <div style={{display:"flex",gap:10}}>
            {STORES.map(s=>{const b=s.badge;return(
              <button key={s.id} type="button" onClick={()=>setForm({...form,storeId:s.id})}
                style={{padding:"6px 14px",borderRadius:999,fontSize:13,fontWeight:600,
                  border:`2px solid ${form.storeId===s.id?b.color:"#E2E8F0"}`,
                  background:form.storeId===s.id?b.bg:"#fff",
                  color:form.storeId===s.id?b.color:"#374151",cursor:"pointer",transition:"all .12s"}}>
                {s.id}
              </button>
            );})}
          </div>
        </div>

        {/* 시간 */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div>
            <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>
              {repeat?"시작일 + 출근 *":"출근 시간 *"}
            </label>
            <input type="datetime-local" value={form.startAt} onChange={e=>setForm({...form,startAt:e.target.value})}
              className="ml-inp" style={{width:"100%",padding:"8px 10px",border:`1px solid ${err.startAt?"#EF4444":"#CBD5E1"}`,borderRadius:6,fontSize:13,outline:"none"}}/>
            {err.startAt&&<p style={{fontSize:12,color:"#EF4444",marginTop:3}}>{err.startAt}</p>}
          </div>
          <div>
            <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>퇴근 시간</label>
            <input type="datetime-local" value={form.endAt} onChange={e=>setForm({...form,endAt:e.target.value})}
              className="ml-inp" style={{width:"100%",padding:"8px 10px",border:`1px solid ${err.endAt?"#EF4444":"#CBD5E1"}`,borderRadius:6,fontSize:13,outline:"none"}}/>
            {err.endAt&&<p style={{fontSize:12,color:"#EF4444",marginTop:3}}>{err.endAt}</p>}
          </div>
        </div>

        {hours!=null&&(
          <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"9px 14px",marginBottom:14,fontSize:13,color:"#14532D",fontWeight:600}}>
            ⏱ 1일 근무 시간: {fmtHours(hours)}
          </div>
        )}

        {/* ── 반복 설정 (신규 등록만) ── */}
        {!isEdit&&(
          <div style={{marginBottom:14,background:"#F8FAFC",borderRadius:10,padding:"12px 14px",border:"1px solid #E2E8F0"}}>
            <label style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",marginBottom:repeat?12:0}}>
              <input type="checkbox" checked={repeat} onChange={e=>setRepeat(e.target.checked)}
                style={{width:16,height:16,accentColor:"#2563EB",cursor:"pointer"}}/>
              <span style={{fontSize:13,fontWeight:600,color:"#1E293B"}}>반복 등록</span>
              <span style={{fontSize:11,color:"#94A3B8"}}>매주 특정 요일에 반복</span>
            </label>

            {repeat&&(
              <>
                {/* 요일 선택 */}
                <div style={{marginBottom:10}}>
                  <div style={{fontSize:12,fontWeight:500,color:"#64748B",marginBottom:6}}>반복 요일</div>
                  <div style={{display:"flex",gap:6}}>
                    {DOW_LABELS.map((label,idx)=>{
                      const sel=repeatDows.includes(idx);
                      const isHol=idx===0||idx===6;
                      return(
                        <button key={idx} type="button" onClick={()=>toggleDow(idx)}
                          style={{width:36,height:36,borderRadius:"50%",fontSize:13,fontWeight:700,border:"none",cursor:"pointer",transition:"all .12s",
                            background:sel?"#2563EB":"#fff",
                            color:sel?"#fff":isHol?(idx===0?"#EF4444":"#3B82F6"):"#374151",
                            boxShadow:sel?"0 0 0 2px #2563EB":"0 0 0 1.5px #CBD5E1"}}>
                          {label}
                        </button>
                      );
                    })}
                  </div>
                  {err.repeat&&<p style={{fontSize:12,color:"#EF4444",marginTop:4}}>{err.repeat}</p>}
                </div>

                {/* 종료일 */}
                <div>
                  <div style={{fontSize:12,fontWeight:500,color:"#64748B",marginBottom:6}}>반복 종료일</div>
                  <input type="date" value={repeatEnd} onChange={e=>setRepeatEnd(e.target.value)}
                    className="ml-inp" style={{padding:"7px 10px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,outline:"none",width:"100%"}}/>
                </div>

                {/* 미리보기 */}
                {previewCount>0&&(
                  <div style={{marginTop:10,background:"#EFF6FF",borderRadius:8,padding:"8px 12px",fontSize:12,color:"#1D4ED8",fontWeight:600}}>
                    📅 총 {previewCount}일 등록 예정
                    {" · "}{fmtHours((hours||0)*previewCount)} 합산
                  </div>
                )}
              </>
            )}
          </div>
        )}

        <div style={{marginBottom:20}}>
          <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>메모</label>
          <input value={form.memo} onChange={e=>setForm({...form,memo:e.target.value})}
            className="ml-inp" style={{width:"100%",padding:"8px 12px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,outline:"none"}}
            placeholder="특이사항 등"/>
        </div>

            <button type="button" onClick={()=>onDelete(record)}
              style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 14px",border:"1px solid #FECACA",borderRadius:6,fontSize:13,color:"#DC2626",background:"#FEF2F2",cursor:"pointer"}}>
              <Trash2 size={13}/> 삭제
            </button>
          ):<span/>}
          <div style={{display:"flex",gap:8}}>
            <button type="button" onClick={onClose}
              style={{padding:"8px 16px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,color:"#64748B",background:"#fff",cursor:"pointer"}}>취소</button>
            <button type="submit" disabled={saving}
              style={{padding:"8px 18px",background:"#2563EB",color:"#fff",borderRadius:6,fontSize:13,border:"none",cursor:"pointer",opacity:saving?.6:1}}>
              {saving?"저장 중…":isEdit?"수정":repeat&&previewCount>1?`${previewCount}일 등록`:"등록"}
            </button>
          </div>
        </div>
      </form>
    </div>
  );
}

function OrderModal({record,onClose,onSave,onDelete}){
  const isEdit=!!record;
  const [form,setForm]=useState(isEdit?{
    storeId:record.storeId, itemName:record.itemName,
    qty:String(record.qty||""), unit:record.unit||"개",
    price:record.price!=null?String(record.price):"",
    orderedAt:record.orderedAt?record.orderedAt.slice(0,10):new Date().toISOString().slice(0,10),
    memo:record.memo||"",
  }:{
    storeId:STORES[0]?.id||"", itemName:"", qty:"", unit:"개", price:"",
    orderedAt:new Date().toISOString().slice(0,10), memo:"",
  });
  const [err,setErr]=useState({});
  const [saving,setSaving]=useState(false);

  async function submit(e){
    e.preventDefault();
    const er={};
    if(!form.storeId)er.storeId="매장을 선택해주세요.";
    if(!form.itemName.trim())er.itemName="품목명을 입력해주세요.";
    if(!form.qty||isNaN(Number(form.qty)))er.qty="수량을 입력해주세요.";
    if(!form.orderedAt)er.orderedAt="날짜를 입력해주세요.";
    if(Object.keys(er).length){setErr(er);return;}
    setSaving(true);
    await onSave({...form,qty:Number(form.qty),price:form.price!==""&&!isNaN(Number(form.price))?Number(form.price):null});
    setSaving(false);
  }

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>

        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:6}}>매장 <span style={{color:"#EF4444"}}>*</span></label>

            {STORES.map(s=>{const b=s.badge;return(
              <button key={s.id} type="button" onClick={()=>setForm({...form,storeId:s.id})}
                style={{padding:"6px 14px",borderRadius:999,fontSize:13,fontWeight:600,
                  border:`2px solid ${form.storeId===s.id?b.color:"#E2E8F0"}`,
                  background:form.storeId===s.id?b.bg:"#fff",color:form.storeId===s.id?b.color:"#374151",cursor:"pointer"}}>
                {s.id}
              </button>
            );})}
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>품목명 <span style={{color:"#EF4444"}}>*</span></label>
          <input value={form.itemName} onChange={e=>setForm({...form,itemName:e.target.value})}
            className="ml-inp" style={{width:"100%",padding:"8px 12px",border:`1px solid ${err.itemName?"#EF4444":"#CBD5E1"}`,borderRadius:6,fontSize:13,outline:"none"}}

          {err.itemName&&<p style={{fontSize:12,color:"#EF4444",marginTop:3}}>{err.itemName}</p>}
        </div>
        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12,marginBottom:14}}>
          <div>
            <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>수량 <span style={{color:"#EF4444"}}>*</span></label>
            <input type="number" value={form.qty} onChange={e=>setForm({...form,qty:e.target.value})}

    </div>
  );
}

/* ══════════════════════════════════
   CALENDAR VIEW
══════════════════════════════════ */
function CalendarView({works, onDayClick}){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth());
  const [holidays,setHolidays]=useState({});

  useEffect(()=>{
    fetchHolidays(year).then(h=>setHolidays(h));
  },[year]);

  function prevMonth(){if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1);}
  function nextMonth(){if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1);}

  const firstDay=new Date(year,month,1).getDay(); // 0=일
  const daysInMonth=new Date(year,month+1,0).getDate();
  const todayStr=dateStr(today);

  // 이달 근무 데이터: date -> {미플:[...], 아카이브:[...]}
  const worksByDate=useMemo(()=>{
    const map={};
    works.forEach(w=>{
      if(!w.startAt)return;
      const d=w.startAt.slice(0,10);
      const ym=d.slice(0,7);
      if(ym!==`${year}-${pad(month+1)}`)return;
      if(!map[d])map[d]={};
      STORES.forEach(s=>{if(!map[d][s.id])map[d][s.id]=[];});
      if(!map[d][w.storeId])map[d][w.storeId]=[];
      map[d][w.storeId].push(w);
    });
    return map;
  },[works,year,month]);

  const DOW=["일","월","화","수","목","금","토"];
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);

  return(
    <div style={{padding:"16px 20px 32px",maxWidth:900,margin:"0 auto"}}>
      {/* 월 네비 */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
        <button onClick={prevMonth} style={{display:"inline-flex",alignItems:"center",padding:"6px 10px",border:"1px solid #E2E8F0",borderRadius:8,background:"#fff",cursor:"pointer"}}>
          <ChevronLeft size={16}/>
        </button>
        <h2 style={{fontSize:18,fontWeight:700,color:"#0F172A"}}>{year}년 {month+1}월</h2>
        <button onClick={nextMonth} style={{display:"inline-flex",alignItems:"center",padding:"6px 10px",border:"1px solid #E2E8F0",borderRadius:8,background:"#fff",cursor:"pointer"}}>
          <ChevronRight size={16}/>
        </button>
      </div>

      {/* 요일 헤더 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4,marginBottom:4}}>
        {DOW.map((d,i)=>(
          <div key={d} style={{textAlign:"center",fontSize:12,fontWeight:700,padding:"6px 0",
            color:i===0?"#EF4444":i===6?"#3B82F6":"#64748B"}}>
            {d}
          </div>
        ))}
      </div>

      {/* 날짜 그리드 */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:4}}>
        {cells.map((day,idx)=>{
          if(!day)return <div key={`empty-${idx}`}/>;
          const ds=`${year}-${pad(month+1)}-${pad(day)}`;
          const dow=(firstDay+day-1)%7;
          const isToday=ds===todayStr;
          const holiday=holidays[ds];
          const isHoliday=!!holiday||dow===0;
          const isSat=dow===6;
          const dayWorks=worksByDate[ds]||{};
          const hasWork=STORES.some(s=>(dayWorks[s.id]||[]).length>0);

          return(
            <div key={ds} className="cal-day"
              onClick={()=>onDayClick(ds)}
              style={{
                minHeight:90,padding:"6px 7px",
                background:isToday?"#EFF6FF":"#fff",
                border:isToday?"1.5px solid #3B82F6":"1px solid #E2E8F0",
                borderRadius:8,
              }}>
              {/* 날짜 숫자 */}
              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:4}}>
                <span style={{
                  fontSize:13,fontWeight:isToday?700:500,
                  color:isHoliday?"#EF4444":isSat?"#3B82F6":"#1E293B",
                  width:22,height:22,display:"inline-flex",alignItems:"center",justifyContent:"center",
                  borderRadius:"50%",background:isToday?"#3B82F6":"transparent",
                  color:isToday?"#fff":isHoliday?"#EF4444":isSat?"#3B82F6":"#1E293B",
                }}>
                  {day}
                </span>
                {holiday&&<span style={{fontSize:9,color:"#EF4444",fontWeight:600,lineHeight:1.2,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{holiday}</span>}
              </div>
              {/* 매장별 근무자 */}
              {STORES.map(s=>{
                const ws=dayWorks[s.id]||[];
                if(ws.length===0)return null;
                const b=s.badge;
                return(
                  <div key={s.id} style={{marginBottom:3}}>
                    <div style={{fontSize:9,fontWeight:700,color:b.color,marginBottom:1,textTransform:"uppercase",letterSpacing:".04em"}}>{s.id}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:2}}>
                      {ws.map(w=>(
                        <span key={w.id} style={{
                          fontSize:10,fontWeight:600,padding:"1px 5px",borderRadius:4,
                          background:staffColor(w.staffId)+"22",
                          color:staffColor(w.staffId),
                          border:`1px solid ${staffColor(w.staffId)}44`,
                        }}>
                          {staffName(w.staffId)}
                        </span>
                      ))}
                    </div>
                  </div>
                );
              })}
              {/* 등록 안내 (빈 날) */}
              {!hasWork&&(
                <div style={{fontSize:10,color:"#CBD5E1",marginTop:2}}>+ 등록</div>
              )}
            </div>
          );
        })}
      </div>

      {/* 범례 */}
      <div style={{display:"flex",flexWrap:"wrap",gap:10,marginTop:16,padding:"12px 16px",background:"#fff",borderRadius:10,border:"1px solid #E2E8F0"}}>
        <span style={{fontSize:11,fontWeight:700,color:"#94A3B8",marginRight:4}}>직원</span>
        {STAFF.map(s=>(
          <span key={s.id} style={{fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:4,background:s.color+"22",color:s.color,border:`1px solid ${s.color}44`}}>
            {s.name}
          </span>
        ))}
        <span style={{fontSize:11,color:"#94A3B8",marginLeft:8}}>날짜 클릭 시 근무 등록</span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   WORK LIST VIEW
══════════════════════════════════ */
function WorkListView({works,onEdit,onDelete}){
  const today=new Date();
  const curMonth=`${today.getFullYear()}-${pad(today.getMonth()+1)}`;
  const [filter,setFilter]=useState({staff:"all",month:curMonth});
  const [sort,setSort]=useState({key:"startAt",dir:"desc"});

  const months=useMemo(()=>{
    const s=new Set(works.map(w=>w.startAt?.slice(0,7)).filter(Boolean));
    return [...s].sort().reverse();
  },[works]);

  const filtered=useMemo(()=>{
    let l=[...works];
    if(filter.staff!=="all")l=l.filter(w=>w.staffId===filter.staff);
    if(filter.month)l=l.filter(w=>w.startAt?.slice(0,7)===filter.month);
    return l.sort((a,b)=>{
      const av=a[sort.key]||"",bv=b[sort.key]||"";
      const c=av<bv?-1:av>bv?1:0;
      return sort.dir==="asc"?c:-c;
    });
  },[works,filter,sort]);

  // 직원별 합계
  const staffTotals=useMemo(()=>{
    const map={};
    STAFF.forEach(s=>{map[s.id]={name:s.name,color:s.color,hours:0,count:0};});
    filtered.forEach(w=>{
      if(!map[w.staffId])return;
      const h=calcHours(w.startAt,w.endAt)||0;
      map[w.staffId].hours+=h;
      map[w.staffId].count+=1;
    });
    return Object.values(map).filter(x=>x.count>0);
  },[filtered]);

  function toggleSort(k){setSort(s=>s.key===k?{...s,dir:s.dir==="asc"?"desc":"asc"}:{key:k,dir:"desc"});}
  function SI({k}){if(sort.key!==k)return React.createElement(ChevronDown,{size:11,style:{opacity:.3}});return sort.dir==="asc"?React.createElement(ChevronUp,{size:11}):React.createElement(ChevronDown,{size:11});}

  return(
    <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
      {/* 필터 */}
      <div style={{background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",padding:"10px 20px",display:"flex",flexWrap:"wrap",alignItems:"center",gap:10,flexShrink:0}}>
        <select value={filter.staff} onChange={e=>setFilter({...filter,staff:e.target.value})}
          style={{padding:"6px 10px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:12,outline:"none",background:"#fff",color:"#1E293B"}}>
          <option value="all">전체 직원</option>
          {STAFF.map(s=><option key={s.id} value={s.id}>{s.name}</option>)}
        </select>
        <select value={filter.month} onChange={e=>setFilter({...filter,month:e.target.value})}
          style={{padding:"6px 10px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:12,outline:"none",background:"#fff",color:"#1E293B"}}>
          <option value="">전체 기간</option>
          {months.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
        <span className="ml-mono" style={{fontSize:11,color:"#94A3B8",marginLeft:"auto"}}>{filtered.length}건</span>
      </div>

      {/* 직원별 합계 고정 행 */}
      {staffTotals.length>0&&(
        <div style={{background:"#1E293B",padding:"10px 20px",display:"flex",flexWrap:"wrap",gap:10,flexShrink:0,borderBottom:"2px solid #334155"}}>
          <span style={{fontSize:11,fontWeight:700,color:"#94A3B8",alignSelf:"center",marginRight:4}}>합계</span>
          {staffTotals.map(s=>(
            <div key={s.name} style={{display:"flex",alignItems:"center",gap:6,background:"rgba(255,255,255,.07)",borderRadius:8,padding:"5px 12px"}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:s.color,display:"inline-block",flexShrink:0}}/>
              <span style={{fontSize:12,fontWeight:600,color:"#F1F5F9"}}>{s.name}</span>
              <span className="ml-mono" style={{fontSize:12,color:"#94A3B8"}}>·</span>
              <span className="ml-mono" style={{fontSize:12,fontWeight:700,color:"#7DD3FC"}}>{fmtHours(s.hours)}</span>
              <span style={{fontSize:11,color:"#64748B"}}>({s.count}일)</span>
            </div>
          ))}
        </div>
      )}

      {/* 테이블 */}
      <div className="tbl-wrap">
        {filtered.length===0?(
          <div style={{padding:40,textAlign:"center",fontSize:13,color:"#94A3B8"}}>근무 기록이 없어요.</div>
        ):(
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead>
              <tr style={{background:"#334155",color:"#E2E8F0"}}>
                <th className="sort-btn" onClick={()=>toggleSort("startAt")} style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:4}}>날짜 <SI k="startAt"/></span>
                </th>
                <th className="sort-btn" onClick={()=>toggleSort("staffId")} style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>
                  <span style={{display:"inline-flex",alignItems:"center",gap:4}}>직원 <SI k="staffId"/></span>
                </th>
                <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>매장</th>
                <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>출근</th>
                <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>퇴근</th>
                <th style={{padding:"10px 14px",textAlign:"center",fontWeight:600,whiteSpace:"nowrap"}}>근무 시간</th>
                <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>메모</th>
                <th style={{padding:"10px 14px",textAlign:"center",fontWeight:600,whiteSpace:"nowrap"}}>관리</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((w,i)=>{
                const hours=calcHours(w.startAt,w.endAt);
                const sb2=storeBadge(w.storeId);
                const sc=staffColor(w.staffId);
                return(
                  <tr key={w.id} className={`ml-row ${i%2===0?"even":"odd"}`}>
                    <td className="ml-mono" style={{padding:"9px 14px",fontSize:12,color:"#374151"}}>{w.startAt?w.startAt.slice(0,10):""}</td>
                    <td style={{padding:"9px 14px"}}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:5}}>
                        <span style={{width:8,height:8,borderRadius:"50%",background:sc,display:"inline-block"}}/>
                        <span style={{fontWeight:600,color:"#1E293B"}}>{staffName(w.staffId)}</span>
                      </span>
                    </td>
                    <td style={{padding:"9px 14px"}}>
                      <span className="tag" style={{background:sb2.bg,color:sb2.color}}>{w.storeId}</span>
                    </td>
                    <td className="ml-mono" style={{padding:"9px 14px",fontSize:12,color:"#374151"}}>{fmtTime(w.startAt)}</td>
                    <td className="ml-mono" style={{padding:"9px 14px",fontSize:12,color:w.endAt?"#374151":"#94A3B8"}}>
                      {w.endAt?fmtTime(w.endAt):"미입력"}

                      {hours!=null
                        ?<span style={{background:"#F0FDF4",color:"#15803D",padding:"2px 10px",borderRadius:999,fontSize:12,fontWeight:600}}>{fmtHours(hours)}</span>

                    </td>
                    <td style={{padding:"9px 14px",color:"#64748B",fontSize:12}}>{w.memo||""}</td>
                    <td style={{padding:"9px 14px",textAlign:"center"}}>
                      <div style={{display:"inline-flex",gap:6}}>
                        <button onClick={()=>onEdit(w)}
                          style={{display:"inline-flex",alignItems:"center",padding:"4px 8px",border:"1px solid #BFDBFE",borderRadius:5,background:"#EFF6FF",color:"#2563EB",cursor:"pointer"}}>
                          <Pencil size={12}/>
                        </button>
                        <button onClick={()=>onDelete(w)}
                          style={{display:"inline-flex",alignItems:"center",padding:"4px 8px",border:"1px solid #FECACA",borderRadius:5,background:"#FEF2F2",color:"#DC2626",cursor:"pointer"}}>
                          <Trash2 size={12}/>
                        </button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════
   MAIN APP
══════════════════════════════════ */
function App(){
  const [tab,setTab]=useState("cal");       // cal | list | order
  const [loading,setLoading]=useState(true);

  const [works,setWorks]=useState([]);
  const [workModal,setWorkModal]=useState(null); // null | {record?:w, date?:str}

  const [orders,setOrders]=useState([]);
  const [orderModal,setOrderModal]=useState(null);

  useEffect(()=>{
    (async()=>{
      try{
        const {data}=await sb.from('work_records').select('*').order('start_at',{ascending:false}).limit(1000);
        setWorks((data||[]).map(r=>({id:r.id,staffId:r.staff_id,storeId:r.store_id,startAt:r.start_at,endAt:r.end_at,memo:r.memo||""})));
      }catch(e){setWorks([]);}
      try{
        const {data}=await sb.from('order_records').select('*').order('ordered_at',{ascending:false}).limit(500);
        setOrders((data||[]).map(r=>({id:r.id,storeId:r.store_id,itemName:r.item_name,qty:r.qty,unit:r.unit||"개",price:r.price,orderedAt:r.ordered_at,memo:r.memo||""})));
      }catch(e){setOrders([]);}
      setLoading(false);
    })();
  },[]);

  /* work CRUD */
  async function handleSaveWork(rows){
    // rows = 배열 (반복 등록 시 여러 개, 단건도 배열로 옴)
    const isEdit=rows.length===1&&!!(workModal?.record);
    try{
      if(isEdit){
        const r=rows[0];
        const row={id:r.id,staff_id:r.staffId,store_id:r.storeId,start_at:r.startAt,end_at:r.endAt||null,memo:r.memo};
        await sb.from('work_records').update(row).eq('id',row.id);
        setWorks(prev=>prev.map(w=>w.id===row.id?{id:row.id,staffId:row.staff_id,storeId:row.store_id,startAt:row.start_at,endAt:row.end_at,memo:row.memo}:w));
      }else{
        const dbRows=rows.map(r=>({id:r.id,staff_id:r.staffId,store_id:r.storeId,start_at:r.startAt,end_at:r.endAt||null,memo:r.memo}));
        await sb.from('work_records').insert(dbRows);
        const newWorks=dbRows.map(r=>({id:r.id,staffId:r.staff_id,storeId:r.store_id,startAt:r.start_at,endAt:r.end_at,memo:r.memo}));
        setWorks(prev=>[...newWorks,...prev]);
      }
      setWorkModal(null);
    }catch(e){alert("저장 실패: "+e.message);}
  }
  async function handleDeleteWork(w){
    if(!window.confirm("이 근무 기록을 삭제할까요?"))return;
    try{
      await sb.from('work_records').delete().eq('id',w.id);
      setWorks(prev=>prev.filter(x=>x.id!==w.id));
      setWorkModal(null);
    }catch(e){alert("삭제 실패: "+e.message);}
  }

  /* order CRUD */
  async function handleSaveOrder(form){
    const isEdit=!!(orderModal?.record);
    const row={
      id:isEdit?orderModal.record.id:uid(),
      store_id:form.storeId, item_name:form.itemName, qty:form.qty,
      unit:form.unit, price:form.price, ordered_at:form.orderedAt, memo:form.memo,
    };
    try{
      if(isEdit){
        await sb.from('order_records').update(row).eq('id',row.id);
        setOrders(prev=>prev.map(o=>o.id===row.id?{id:row.id,storeId:row.store_id,itemName:row.item_name,qty:row.qty,unit:row.unit,price:row.price,orderedAt:row.ordered_at,memo:row.memo}:o));
      }else{
        await sb.from('order_records').insert(row);
        setOrders(prev=>[{id:row.id,storeId:row.store_id,itemName:row.item_name,qty:row.qty,unit:row.unit,price:row.price,orderedAt:row.ordered_at,memo:row.memo},...prev]);
      }
      setOrderModal(null);
    }catch(e){alert("저장 실패: "+e.message);}
  }
  async function handleDeleteOrder(o){
    if(!window.confirm("이 주문 기록을 삭제할까요?"))return;
    try{
      await sb.from('order_records').delete().eq('id',o.id);
      setOrders(prev=>prev.filter(x=>x.id!==o.id));
      setOrderModal(null);
    }catch(e){alert("삭제 실패: "+e.message);}
  }

  const TABS=[
    {id:"cal",   label:"근무 캘린더", icon:React.createElement(CalIcon,{size:13})},
    {id:"list",  label:"근무 목록",   icon:React.createElement(List,{size:13})},
    {id:"order", label:"재고 주문",   icon:React.createElement(Package,{size:13})},
  ];

  return(
    <div className="ml-root">
      <style>{CSS}</style>

      {/* ── 헤더 ── */}
      <div style={{background:"#1E293B",padding:"16px 24px 0"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <div>
            <div className="ml-mono" style={{fontSize:10,letterSpacing:".12em",textTransform:"uppercase",color:"#94A3B8"}}>업무 관리</div>
            <h1 style={{fontSize:20,fontWeight:700,color:"#F8FAFC",marginTop:1}}>미플+아카이브</h1>
          </div>
          <div>
            {tab==="order"&&(
              <button onClick={()=>setOrderModal({})}
                style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 14px",background:"#2563EB",color:"#fff",borderRadius:6,fontSize:13,fontWeight:500,border:"none",cursor:"pointer"}}>
                <Plus size={13}/> 주문 등록
              </button>
            )}
          </div>
        </div>
        <div style={{display:"flex",gap:2}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:"20px 20px 0 0",fontSize:13,fontWeight:500,border:"none",cursor:"pointer",whiteSpace:"nowrap",
                background:tab===t.id?"rgba(255,255,255,.1)":"transparent",
                color:tab===t.id?"#F8FAFC":"#94A3B8",
                borderBottom:tab===t.id?"2px solid #3B82F6":"2px solid transparent"}}>
              {t.icon}{t.label}
            </button>
          ))}
        </div>
      </div>

      {/* ── 콘텐츠 ── */}
      {loading?(
        <div style={{padding:40,textAlign:"center",fontSize:13,color:"#64748B"}}>불러오는 중…</div>
      ):(
        <>
          {tab==="cal"&&(
            <div style={{flex:1,overflow:"auto"}}>
              <CalendarView works={works} onDayClick={ds=>setWorkModal({date:ds})}/>
            </div>
          )}
          {tab==="list"&&(
            <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
              <WorkListView works={works}
                onEdit={w=>setWorkModal({record:w})}
                onDelete={handleDeleteWork}/>
            </div>
          )}
          {tab==="order"&&(
            <div style={{display:"flex",flexDirection:"column",flex:1,overflow:"hidden"}}>
              <div className="tbl-wrap">
                {orders.length===0?(
                  <div style={{padding:40,textAlign:"center",fontSize:13,color:"#94A3B8"}}>주문 기록이 없어요. 위에서 등록해주세요.</div>
                ):(
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead>
                      <tr style={{background:"#334155",color:"#E2E8F0"}}>
                        <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>날짜</th>
                        <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>매장</th>
                        <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>품목</th>
                        <th style={{padding:"10px 14px",textAlign:"center",fontWeight:600,whiteSpace:"nowrap"}}>수량</th>
                        <th style={{padding:"10px 14px",textAlign:"right",fontWeight:600,whiteSpace:"nowrap"}}>금액</th>
                        <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>메모</th>
                        <th style={{padding:"10px 14px",textAlign:"center",fontWeight:600,whiteSpace:"nowrap"}}>관리</th>
                      </tr>
                    </thead>
                    <tbody>
                      {orders.map((o,i)=>{
                        const sb2=storeBadge(o.storeId);
                        return(
                          <tr key={o.id} className={`ml-row ${i%2===0?"even":"odd"}`}>
                            <td className="ml-mono" style={{padding:"9px 14px",fontSize:12,color:"#374151"}}>{o.orderedAt||"—"}</td>
                            <td style={{padding:"9px 14px"}}>
                              <span className="tag" style={{background:sb2.bg,color:sb2.color}}>{o.storeId}</span>
                            </td>
                            <td style={{padding:"9px 14px",fontWeight:500,color:"#1E293B"}}>{o.itemName}</td>
                            <td style={{padding:"9px 14px",textAlign:"center"}}>
                              <span className="ml-mono" style={{fontSize:12,color:"#374151"}}>{o.qty} {o.unit}</span>
                            </td>
                            <td style={{padding:"9px 14px",textAlign:"right"}}>
                              {o.price!=null&&o.price!==""
                                ?<span className="ml-mono" style={{fontSize:12,color:"#1E293B",fontWeight:500}}>{Number(o.price).toLocaleString()}원</span>
                                :<span style={{color:"#94A3B8",fontSize:12}}>—</span>}
                            </td>
                            <td style={{padding:"9px 14px",color:"#64748B",fontSize:12}}>{o.memo||""}</td>
                            <td style={{padding:"9px 14px",textAlign:"center"}}>
                              <div style={{display:"inline-flex",gap:6}}>
                                <button onClick={()=>setOrderModal({record:o})}
                                  style={{display:"inline-flex",alignItems:"center",padding:"4px 8px",border:"1px solid #BFDBFE",borderRadius:5,background:"#EFF6FF",color:"#2563EB",cursor:"pointer"}}>
                                  <Pencil size={12}/>
                                </button>
                                <button onClick={()=>handleDeleteOrder(o)}
                                  style={{display:"inline-flex",alignItems:"center",padding:"4px 8px",border:"1px solid #FECACA",borderRadius:5,background:"#FEF2F2",color:"#DC2626",cursor:"pointer"}}>
                                  <Trash2 size={12}/>
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                )}
              </div>
            </div>
          )}
        </>
      )}

      {/* ── 모달 ── */}
      {workModal!==null&&(
        <WorkModal
          record={workModal.record||null}
          defaultDate={workModal.date||null}
          onClose={()=>setWorkModal(null)}
          onSave={handleSaveWork}
          onDelete={handleDeleteWork}
        />
      )}
      {orderModal!==null&&(
        <OrderModal
          record={orderModal.record||null}
          onClose={()=>setOrderModal(null)}
          onSave={handleSaveOrder}
          onDelete={handleDeleteOrder}
        />
      )}
    </div>
  );
}

root.render(<App/>);
