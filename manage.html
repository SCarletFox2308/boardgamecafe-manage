/* ══════════════════════════════════════════════════════════
   ★ 매장 설정 ★

const STORES = [
  { id: "미플", label: "미플보드게임", badge: { bg: "#FEF3C7", color: "#92400E" } },
  { id: "아카이브", label: "보드게임 아카이브", badge: { bg: "#DBEAFE", color: "#1E40AF" } },
];

/* ══════════════════════════════════════════════════════════
   ★ 직원 목록 — 이름과 색상을 여기서 관리합니다 ★
══════════════════════════════════════════════════════════ */
const STAFF = [
  { id: "staff1", name: "직원1", color: "#6D28D9" },
  { id: "staff2", name: "직원2", color: "#0369A1" },
  { id: "staff3", name: "직원3", color: "#065F46" },
  { id: "staff4", name: "직원4", color: "#9A3412" },
];

/* helpers */
function uid() {
  return typeof crypto !== "undefined" && crypto.randomUUID
    ? crypto.randomUUID()
    : `r-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}
function toLocalISO(date) {
  const d = date || new Date();
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
}
function fmtDateTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return `${fmtDate(iso)} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function calcHours(start, end) {
  if (!start || !end) return null;
  const diff = (new Date(end) - new Date(start)) / 3600000;
  return diff > 0 ? diff : null;
}
function fmtHours(h) {
  if (h == null) return "—";
  const hr = Math.floor(h);
  const min = Math.round((h - hr) * 60);
  return min === 0 ? `${hr}시간` : `${hr}시간 ${min}분`;
}
function storeBadge(sid) {
  const s = STORES.find(x => x.id === sid);
  return s ? s.badge : { bg: "#F3F4F6", color: "#374151" };
}
function staffColor(staffId) {
  const s = STAFF.find(x => x.id === staffId);
  return s ? s.color : "#6B7280";
}
function staffName(staffId) {
  const s = STAFF.find(x => x.id === staffId);
  return s ? s.name : staffId || "—";
}

const TABS = [
  { id: "work", label: "근무 시간" },
  { id: "order", label: "재고 주문" },
];

const CSS = `

/* ═══════════ PIN MODAL ═══════════ */
function PinModal({pin, onSuccess, onClose}) {
  const [mode]       = useState(pin == null ? "setup" : "unlock");
  const [inp, setInp] = useState("");
  const [conf, setConf] = useState("");
  const [err, setErr]   = useState("");

  async function submit(e) {
    e.preventDefault(); setErr("");
    if (mode === "unlock") {
      if (inp === pin) onSuccess(inp);
      else setErr("암호가 틀렸어요.");
      return;
    }
    if (!inp.trim())  { setErr("암호를 입력해주세요."); return; }
    if (inp !== conf) { setErr("암호가 서로 달라요."); return; }
    try { await sb.from('settings').upsert({ key: 'manage_pin', value: inp }); } catch(e) {}
    onSuccess(inp);
  }

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <form className="modal-box fade-in" onSubmit={submit} style={{padding:24,color:"#1E293B"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <h2 style={{fontSize:18,fontWeight:700}}>{mode === "setup" ? "관리자 암호 설정" : "관리자 접속"}</h2>
          <button type="button" onClick={onClose} style={{background:"none",border:"none",cursor:"pointer"}}><X size={18}/></button>
        </div>
        <p style={{fontSize:13,color:"#64748B",marginBottom:12}}>
          {mode === "setup" ? "처음 사용 시 관리자 암호를 설정해주세요." : "암호를 입력하면 관리자 모드로 전환돼요."}
        </p>
        <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>{mode === "unlock" ? "암호" : "새 암호"}</label>
        <input type="password" autoFocus value={inp} onChange={e => setInp(e.target.value)}
          className="ml-inp" style={{width:"100%",padding:"8px 12px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,marginBottom:12,outline:"none"}}/>
        {mode !== "unlock" && <>
          <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>암호 확인</label>
          <input type="password" value={conf} onChange={e => setConf(e.target.value)}
            className="ml-inp" style={{width:"100%",padding:"8px 12px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,marginBottom:12,outline:"none"}}/>
        </>}
        {err && <p style={{fontSize:12,color:"#EF4444",marginBottom:8}}>{err}</p>}
        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button type="button" onClick={onClose} style={{padding:"8px 16px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,color:"#64748B",background:"#fff",cursor:"pointer"}}>취소</button>
          <button type="submit" style={{padding:"8px 16px",background:"#1E293B",color:"#fff",borderRadius:6,fontSize:13,border:"none",cursor:"pointer"}}>
            {mode === "unlock" ? "접속" : "설정 후 접속"}
          </button>
        </div>
      </form>
    </div>
  );
}

/* ═══════════ WORK RECORD MODAL (Add / Edit) ═══════════ */
function WorkModal({record, onClose, onSave}) {
  const isEdit = !!record;
  const now = new Date();
  const [form, setForm] = useState(isEdit ? {
    staffId: record.staffId,
    storeId: record.storeId,
    startAt: record.startAt ? toLocalISO(new Date(record.startAt)) : "",
    endAt:   record.endAt   ? toLocalISO(new Date(record.endAt))   : "",
    memo:    record.memo || "",
  } : {
    staffId: STAFF[0]?.id || "",
    storeId: STORES[0]?.id || "",
    startAt: toLocalISO(now),
    endAt: "",
    memo: "",
  });
  const [err, setErr] = useState({});
  const [saving, setSaving] = useState(false);

  const hours = calcHours(form.startAt, form.endAt);

  async function submit(e) {
    e.preventDefault();
    const er = {};
    if (!form.staffId) er.staffId = "직원을 선택해주세요.";
    if (!form.storeId) er.storeId = "매장을 선택해주세요.";
    if (!form.startAt) er.startAt = "시작 시간을 입력해주세요.";
    if (form.endAt && form.startAt && new Date(form.endAt) <= new Date(form.startAt)) er.endAt = "종료 시간이 시작보다 빠릅니다.";
    if (Object.keys(er).length) { setErr(er); return; }
    setSaving(true);
    await onSave({
      ...form,
      startAt: form.startAt ? new Date(form.startAt).toISOString() : null,
      endAt:   form.endAt   ? new Date(form.endAt).toISOString()   : null,
    });
    setSaving(false);
  }

  const field = (label, key, content, errKey) => (
    <div style={{marginBottom:14}}>
      <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>{label}</label>
      {content}
      {err[errKey||key] && <p style={{fontSize:12,color:"#EF4444",marginTop:3}}>{err[errKey||key]}</p>}
    </div>
  );

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <form className="modal-box fade-in" onSubmit={submit} style={{padding:24,color:"#1E293B"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h2 style={{fontSize:17,fontWeight:700}}>{isEdit ? "근무 기록 수정" : "근무 시간 등록"}</h2>
          <button type="button" onClick={onClose} style={{background:"none",border:"none",cursor:"pointer"}}><X size={18}/></button>
        </div>

        {field("직원 *", "staffId",
          <select value={form.staffId} onChange={e => setForm({...form, staffId: e.target.value})}
            className="ml-sel" style={{width:"100%",padding:"8px 12px",border:`1px solid ${err.staffId?"#EF4444":"#CBD5E1"}`,borderRadius:6,fontSize:13,outline:"none",background:"#fff"}}>
            <option value="">— 선택 —</option>
            {STAFF.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
          </select>
        )}

        {field("매장 *", "storeId",
          <div style={{display:"flex",gap:16}}>
            {STORES.map(s => (
              <label key={s.id} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer"}}>
                <input type="radio" name="storeId" value={s.id} checked={form.storeId === s.id}
                  onChange={() => setForm({...form, storeId: s.id})}/>
                {s.label}
              </label>
            ))}
          </div>
        )}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div>
            <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>출근 시간 *</label>
            <input type="datetime-local" value={form.startAt} onChange={e => setForm({...form, startAt: e.target.value})}
              className="ml-inp" style={{width:"100%",padding:"8px 10px",border:`1px solid ${err.startAt?"#EF4444":"#CBD5E1"}`,borderRadius:6,fontSize:13,outline:"none"}}/>
            {err.startAt && <p style={{fontSize:12,color:"#EF4444",marginTop:3}}>{err.startAt}</p>}
          </div>
          <div>
            <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>퇴근 시간</label>
            <input type="datetime-local" value={form.endAt} onChange={e => setForm({...form, endAt: e.target.value})}
              className="ml-inp" style={{width:"100%",padding:"8px 10px",border:`1px solid ${err.endAt?"#EF4444":"#CBD5E1"}`,borderRadius:6,fontSize:13,outline:"none"}}/>
            {err.endAt && <p style={{fontSize:12,color:"#EF4444",marginTop:3}}>{err.endAt}</p>}
          </div>
        </div>

        {hours != null && (
          <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#14532D",fontWeight:600}}>
            ⏱ 근무 시간: {fmtHours(hours)}
          </div>
        )}

        {field("메모", "memo",
          <input value={form.memo} onChange={e => setForm({...form, memo: e.target.value})}
            className="ml-inp" style={{width:"100%",padding:"8px 12px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,outline:"none"}}
            placeholder="특이사항, 업무 내용 등"/>
        )}

        <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginTop:4}}>
          <button type="button" onClick={onClose} style={{padding:"8px 16px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,color:"#64748B",background:"#fff",cursor:"pointer"}}>취소</button>
          <button type="submit" disabled={saving} style={{padding:"8px 18px",background:"#2563EB",color:"#fff",borderRadius:6,fontSize:13,border:"none",cursor:"pointer",opacity:saving?.6:1}}>
            {saving ? "저장 중…" : (isEdit ? "수정" : "등록")}
          </button>
        </div>
      </form>
    </div>
  );
}

/* ═══════════ ORDER RECORD MODAL ═══════════ */
function OrderModal({record, onClose, onSave}) {
  const isEdit = !!record;
  const [form, setForm] = useState(isEdit ? {
    storeId:  record.storeId,
    itemName: record.itemName,
    qty:      String(record.qty || ""),
    unit:     record.unit || "개",
    price:    record.price != null ? String(record.price) : "",
    orderedAt: record.orderedAt ? record.orderedAt.slice(0,10) : new Date().toISOString().slice(0,10),
    memo:     record.memo || "",
  } : {
    storeId: STORES[0]?.id || "",
    itemName: "",
    qty: "",
    unit: "개",
    price: "",
    orderedAt: new Date().toISOString().slice(0,10),
    memo: "",
  });
  const [err, setErr] = useState({});
  const [saving, setSaving] = useState(false);

  async function submit(e) {
    e.preventDefault();
    const er = {};
    if (!form.storeId)     er.storeId = "매장을 선택해주세요.";
    if (!form.itemName.trim()) er.itemName = "품목명을 입력해주세요.";
    if (!form.qty || isNaN(Number(form.qty))) er.qty = "수량을 입력해주세요.";
    if (!form.orderedAt) er.orderedAt = "날짜를 입력해주세요.";
    if (Object.keys(er).length) { setErr(er); return; }
    setSaving(true);
    await onSave({
      ...form,
      qty: Number(form.qty),
      price: form.price !== "" && !isNaN(Number(form.price)) ? Number(form.price) : null,
    });
    setSaving(false);
  }

  return (
    <div className="modal-overlay" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <form className="modal-box fade-in" onSubmit={submit} style={{padding:24,color:"#1E293B"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <h2 style={{fontSize:17,fontWeight:700}}>{isEdit ? "주문 기록 수정" : "재고 주문 등록"}</h2>
          <button type="button" onClick={onClose} style={{background:"none",border:"none",cursor:"pointer"}}><X size={18}/></button>
        </div>

        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>매장 *</label>
          <div style={{display:"flex",gap:16}}>
            {STORES.map(s => (
              <label key={s.id} style={{display:"flex",alignItems:"center",gap:6,fontSize:13,cursor:"pointer"}}>
                <input type="radio" name="oStoreId" value={s.id} checked={form.storeId === s.id}
                  onChange={() => setForm({...form, storeId: s.id})}/>
                {s.label}
              </label>
            ))}
          </div>
          {err.storeId && <p style={{fontSize:12,color:"#EF4444",marginTop:3}}>{err.storeId}</p>}
        </div>

        <div style={{marginBottom:14}}>
          <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>품목명 *</label>
          <input value={form.itemName} onChange={e => setForm({...form, itemName: e.target.value})}
            className="ml-inp" style={{width:"100%",padding:"8px 12px",border:`1px solid ${err.itemName?"#EF4444":"#CBD5E1"}`,borderRadius:6,fontSize:13,outline:"none"}}
            placeholder="예: 음료수, 컵, 영수증지"/>
          {err.itemName && <p style={{fontSize:12,color:"#EF4444",marginTop:3}}>{err.itemName}</p>}
        </div>

        <div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:12,marginBottom:14}}>
          <div>
            <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>수량 *</label>
            <input type="number" value={form.qty} onChange={e => setForm({...form, qty: e.target.value})}
              className="ml-inp" style={{width:"100%",padding:"8px 12px",border:`1px solid ${err.qty?"#EF4444":"#CBD5E1"}`,borderRadius:6,fontSize:13,outline:"none"}}
              placeholder="0" min="0"/>
            {err.qty && <p style={{fontSize:12,color:"#EF4444",marginTop:3}}>{err.qty}</p>}
          </div>
          <div>
            <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>단위</label>
            <select value={form.unit} onChange={e => setForm({...form, unit: e.target.value})}
              className="ml-sel" style={{width:"100%",padding:"8px 12px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,outline:"none",background:"#fff"}}>
              {["개","박스","봉","병","롤","세트","kg","L"].map(u => <option key={u} value={u}>{u}</option>)}
            </select>
          </div>
        </div>

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <div>
            <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>금액 (원, 선택)</label>
            <input type="number" value={form.price} onChange={e => setForm({...form, price: e.target.value})}
              className="ml-inp" style={{width:"100%",padding:"8px 12px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,outline:"none"}}
              placeholder="0" min="0"/>
          </div>
          <div>
            <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>주문 날짜 *</label>
            <input type="date" value={form.orderedAt} onChange={e => setForm({...form, orderedAt: e.target.value})}
              className="ml-inp" style={{width:"100%",padding:"8px 12px",border:`1px solid ${err.orderedAt?"#EF4444":"#CBD5E1"}`,borderRadius:6,fontSize:13,outline:"none"}}/>
            {err.orderedAt && <p style={{fontSize:12,color:"#EF4444",marginTop:3}}>{err.orderedAt}</p>}
          </div>
        </div>

        <div style={{marginBottom:20}}>
          <label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>메모</label>
          <input value={form.memo} onChange={e => setForm({...form, memo: e.target.value})}
            className="ml-inp" style={{width:"100%",padding:"8px 12px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,outline:"none"}}
            placeholder="배송 정보, 담당자 등"/>
        </div>

        <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
          <button type="button" onClick={onClose} style={{padding:"8px 16px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:13,color:"#64748B",background:"#fff",cursor:"pointer"}}>취소</button>
          <button type="submit" disabled={saving} style={{padding:"8px 18px",background:"#2563EB",color:"#fff",borderRadius:6,fontSize:13,border:"none",cursor:"pointer",opacity:saving?.6:1}}>
            {saving ? "저장 중…" : (isEdit ? "수정" : "등록")}
          </button>
        </div>
      </form>
    </div>
  );
}

      <div style={{background:"#fff",borderRadius:12,padding:24,boxShadow:"0 1px 4px rgba(0,0,0,.06)",border:"1px solid #E2E8F0",marginBottom:20}}>
        <div style={{fontSize:11,fontWeight:700,letterSpacing:".1em",textTransform:"uppercase",color:"#94A3B8",marginBottom:10}}>Supabase 테이블 설정</div>

          이 사이트는 Supabase와 연동됩니다. 아래 세 개의 테이블을 만들어주세요.

        {[
          { name:"work_records", desc:"근무 기록 테이블", cols:[

            "staff_id text",
            "store_id text",
            "start_at timestamptz",
            "end_at timestamptz",
            "memo text",
            "created_at timestamptz default now()",

          { name:"order_records", desc:"재고 주문 기록 테이블", cols:[

            "store_id text",
            "item_name text",
            "qty numeric",
            "unit text",
            "price numeric",
            "ordered_at date",
            "memo text",
            "created_at timestamptz default now()",

          { name:"settings", desc:"설정 (PIN 등)", cols:[

            "value text",

        ].map(t => (
          <div key={t.name} style={{marginBottom:20}}>
            <div style={{fontSize:13,fontWeight:700,color:"#1E293B",marginBottom:4}}>📋 {t.name} <span style={{fontSize:11,fontWeight:400,color:"#64748B"}}>— {t.desc}</span></div>
            <div style={{background:"#1E293B",borderRadius:8,padding:"12px 16px",fontFamily:"IBM Plex Mono, monospace",fontSize:12,color:"#E2E8F0",lineHeight:1.7}}>
              <span style={{color:"#93C5FD"}}>create table</span> {t.name} (<br/>
              {t.cols.map((c,i) => <span key={i}>&nbsp;&nbsp;{c}{i<t.cols.length-1?",":" "}<br/></span>)}
              );
            </div>
          </div>
        ))}
        <div style={{background:"#FEF9C3",borderRadius:8,padding:"12px 16px",fontSize:13,color:"#713F12",border:"1px solid #FDE68A"}}>
          ⚠️ 설정 후 이 파일의 <b>Supabase URL</b>과 <b>anon key</b>를 보드게임 목록 사이트와 같은 값으로 교체하거나, 새 프로젝트라면 새 값으로 입력해주세요.
        </div>
      </div>

}

/* ═══════════ MAIN APP ═══════════ */
function App() {
  const [tab, setTab]         = useState("work");
  const [mode, setMode]       = useState("view");
  const [pin, setPin]         = useState(undefined);
  const [showPin, setShowPin] = useState(false);
  const [loading, setLoading] = useState(true);

  // Work state
  const [works, setWorks]         = useState([]);
  const [showWork, setShowWork]   = useState(false);
  const [editWork, setEditWork]   = useState(null);
  const [workFilter, setWorkFilter] = useState({ staff: "all", store: "all", month: "" });
  const [workSort, setWorkSort]   = useState({ key: "startAt", dir: "desc" });

  // Order state
  const [orders, setOrders]       = useState([]);
  const [showOrder, setShowOrder] = useState(false);
  const [editOrder, setEditOrder] = useState(null);
  const [orderFilter, setOrderFilter] = useState({ store: "all", month: "" });
  const [orderSort, setOrderSort] = useState({ key: "orderedAt", dir: "desc" });

  const isAdmin = mode === "admin";

  /* load */
  useEffect(() => {
    (async () => {
      try {
        const { data: pin_data } = await sb.from('settings').select('value').eq('key','manage_pin').maybeSingle();
        setPin(pin_data ? pin_data.value : null);
      } catch(e) { setPin(null); }

      try {
        const { data } = await sb.from('work_records').select('*').order('start_at', {ascending:false}).limit(500);
        setWorks((data||[]).map(r => ({
          id: r.id, staffId: r.staff_id, storeId: r.store_id,
          startAt: r.start_at, endAt: r.end_at, memo: r.memo||"",
        })));
      } catch(e) { setWorks([]); }

      try {
        const { data } = await sb.from('order_records').select('*').order('ordered_at', {ascending:false}).limit(500);
        setOrders((data||[]).map(r => ({
          id: r.id, storeId: r.store_id, itemName: r.item_name,
          qty: r.qty, unit: r.unit||"개", price: r.price,
          orderedAt: r.ordered_at, memo: r.memo||"",
        })));
      } catch(e) { setOrders([]); }

      setLoading(false);
    })();
  }, []);

  /* work handlers */
  async function handleSaveWork(form) {
    const row = {
      id: editWork ? editWork.id : uid(),
      staff_id: form.staffId,
      store_id: form.storeId,
      start_at: form.startAt,
      end_at: form.endAt || null,
      memo: form.memo,
    };
    try {
      if (editWork) {
        await sb.from('work_records').update(row).eq('id', row.id);
        setWorks(prev => prev.map(w => w.id === row.id ? { id:row.id, staffId:row.staff_id, storeId:row.store_id, startAt:row.start_at, endAt:row.end_at, memo:row.memo } : w));
      } else {
        await sb.from('work_records').insert(row);
        setWorks(prev => [{ id:row.id, staffId:row.staff_id, storeId:row.store_id, startAt:row.start_at, endAt:row.end_at, memo:row.memo }, ...prev]);
      }
      setShowWork(false); setEditWork(null);
    } catch(e) { alert("저장 실패: " + e.message); }
  }
  async function handleDeleteWork(w) {
    if (!window.confirm("이 근무 기록을 삭제할까요?")) return;
    try {
      await sb.from('work_records').delete().eq('id', w.id);
      setWorks(prev => prev.filter(x => x.id !== w.id));
    } catch(e) { alert("삭제 실패: " + e.message); }
  }

  /* order handlers */
  async function handleSaveOrder(form) {
    const row = {
      id: editOrder ? editOrder.id : uid(),
      store_id: form.storeId,
      item_name: form.itemName,
      qty: form.qty,
      unit: form.unit,
      price: form.price,
      ordered_at: form.orderedAt,
      memo: form.memo,
    };
    try {
      if (editOrder) {
        await sb.from('order_records').update(row).eq('id', row.id);
        setOrders(prev => prev.map(o => o.id === row.id ? { id:row.id, storeId:row.store_id, itemName:row.item_name, qty:row.qty, unit:row.unit, price:row.price, orderedAt:row.ordered_at, memo:row.memo } : o));
      } else {
        await sb.from('order_records').insert(row);
        setOrders(prev => [{ id:row.id, storeId:row.store_id, itemName:row.item_name, qty:row.qty, unit:row.unit, price:row.price, orderedAt:row.ordered_at, memo:row.memo }, ...prev]);
      }
      setShowOrder(false); setEditOrder(null);
    } catch(e) { alert("저장 실패: " + e.message); }
  }
  async function handleDeleteOrder(o) {
    if (!window.confirm("이 주문 기록을 삭제할까요?")) return;
    try {
      await sb.from('order_records').delete().eq('id', o.id);
      setOrders(prev => prev.filter(x => x.id !== o.id));
    } catch(e) { alert("삭제 실패: " + e.message); }
  }

  /* derived: work */
  const filteredWorks = useMemo(() => {
    let l = [...works];
    if (workFilter.staff !== "all") l = l.filter(w => w.staffId === workFilter.staff);
    if (workFilter.store !== "all") l = l.filter(w => w.storeId === workFilter.store);
    if (workFilter.month) l = l.filter(w => w.startAt && w.startAt.slice(0,7) === workFilter.month);
    return l.sort((a,b) => {
      const av = a[workSort.key] || "", bv = b[workSort.key] || "";
      const c = av < bv ? -1 : av > bv ? 1 : 0;
      return workSort.dir === "asc" ? c : -c;
    });
  }, [works, workFilter, workSort]);

  const workStats = useMemo(() => {
    const totalHours = filteredWorks.reduce((sum,w) => sum + (calcHours(w.startAt,w.endAt)||0), 0);
    return { count: filteredWorks.length, totalHours };
  }, [filteredWorks]);

  /* derived: orders */
  const filteredOrders = useMemo(() => {
    let l = [...orders];
    if (orderFilter.store !== "all") l = l.filter(o => o.storeId === orderFilter.store);
    if (orderFilter.month) l = l.filter(o => o.orderedAt && o.orderedAt.slice(0,7) === orderFilter.month);
    return l.sort((a,b) => {
      const av = a[orderSort.key] || "", bv = b[orderSort.key] || "";
      const c = av < bv ? -1 : av > bv ? 1 : 0;
      return orderSort.dir === "asc" ? c : -c;
    });
  }, [orders, orderFilter, orderSort]);

  const orderStats = useMemo(() => {
    const totalPrice = filteredOrders.reduce((sum,o) => sum + (o.price||0), 0);
    return { count: filteredOrders.length, totalPrice };
  }, [filteredOrders]);

  function toggleWorkSort(k) {
    setWorkSort(s => s.key === k ? {...s, dir: s.dir==="asc"?"desc":"asc"} : {key:k,dir:"desc"});
  }
  function toggleOrderSort(k) {
    setOrderSort(s => s.key === k ? {...s, dir: s.dir==="asc"?"desc":"asc"} : {key:k,dir:"desc"});
  }
  function SortIcon({k, sort}) {
    if (sort.key !== k) return React.createElement(ChevronDown, {size:11,style:{opacity:.3}});
    return sort.dir === "asc" ? React.createElement(ChevronUp,{size:11}) : React.createElement(ChevronDown,{size:11});
  }

  /* month options */
  const workMonths = useMemo(() => {
    const s = new Set(works.map(w => w.startAt?.slice(0,7)).filter(Boolean));
    return [...s].sort().reverse();
  }, [works]);
  const orderMonths = useMemo(() => {
    const s = new Set(orders.map(o => o.orderedAt?.slice(0,7)).filter(Boolean));
    return [...s].sort().reverse();
  }, [orders]);

  return (
    <div className="ml-root" style={{background:"#F1F5F9"}}>
      <style>{CSS}</style>

      {/* header */}
      <div style={{background:isAdmin?"#0F172A":"#1E293B",padding:"20px 24px 0"}}>
        <div style={{display:"flex",flexWrap:"wrap",alignItems:"flex-start",justifyContent:"space-between",gap:12,marginBottom:12}}>
          <div>
            <div className="ml-mono" style={{fontSize:11,letterSpacing:".12em",textTransform:"uppercase",color:"#94A3B8",display:"flex",alignItems:"center",gap:8}}>
              업무 관리
              {isAdmin && <span style={{background:"#2563EB",color:"#fff",padding:"1px 8px",borderRadius:4,fontSize:10,fontWeight:700}}>관리자</span>}
            </div>
            <h1 style={{fontSize:22,fontWeight:700,color:"#F8FAFC",marginTop:2}}>미플+아카이브</h1>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {isAdmin ? (
              <>
                {tab === "work" && (
                  <button onClick={() => { setEditWork(null); setShowWork(true); }}
                    style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 14px",background:"#2563EB",color:"#fff",borderRadius:6,fontSize:13,fontWeight:500,border:"none",cursor:"pointer"}}>
                    <Plus size={13}/> 근무 등록
                  </button>
                )}
                {tab === "order" && (
                  <button onClick={() => { setEditOrder(null); setShowOrder(true); }}
                    style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 14px",background:"#2563EB",color:"#fff",borderRadius:6,fontSize:13,fontWeight:500,border:"none",cursor:"pointer"}}>
                    <Plus size={13}/> 주문 등록
                  </button>
                )}
                <button onClick={() => setMode("view")}
                  style={{padding:"7px 14px",background:"rgba(255,255,255,.08)",color:"#CBD5E1",borderRadius:6,fontSize:13,border:"none",cursor:"pointer"}}>
                  관리자 종료
                </button>
              </>
            ) : (
              <button onClick={() => setShowPin(true)} disabled={pin===undefined}
                style={{display:"inline-flex",alignItems:"center",gap:6,padding:"7px 14px",background:"rgba(255,255,255,.08)",color:pin===undefined?"#4B5563":"#CBD5E1",borderRadius:6,fontSize:13,border:"none",cursor:pin===undefined?"not-allowed":"pointer"}}>
                <Lock size={13}/> 관리자
              </button>
            )}
          </div>
        </div>

        {/* tabs */}
        <div style={{display:"flex",gap:4}}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)}
              style={{display:"inline-flex",alignItems:"center",gap:6,padding:"8px 16px",borderRadius:"20px 20px 0 0",fontSize:13,fontWeight:500,border:"none",cursor:"pointer",whiteSpace:"nowrap",
                background:tab===t.id?"rgba(255,255,255,.1)":"transparent",
                color:tab===t.id?"#F8FAFC":"#94A3B8",
                borderBottom:tab===t.id?"2px solid #3B82F6":"2px solid transparent"}}>
              {t.id==="work" ? React.createElement(Clock,{size:13}) : React.createElement(Package,{size:13})}
              {t.label}
            </button>
          ))}
        </div>
      </div>

      {/* ════ 근무 시간 탭 ════ */}
      {tab === "work" && (
        <div className="ml-content">
          {/* filters */}
          <div style={{background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",padding:"10px 20px",display:"flex",flexWrap:"wrap",alignItems:"center",gap:10,flexShrink:0}}>
            <select value={workFilter.staff} onChange={e => setWorkFilter({...workFilter, staff:e.target.value})}
              style={{padding:"6px 10px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:12,outline:"none",background:"#fff",color:"#1E293B"}}>
              <option value="all">전체 직원</option>
              {STAFF.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
            </select>
            <select value={workFilter.store} onChange={e => setWorkFilter({...workFilter, store:e.target.value})}
              style={{padding:"6px 10px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:12,outline:"none",background:"#fff",color:"#1E293B"}}>
              <option value="all">전체 매장</option>
              {STORES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
            <select value={workFilter.month} onChange={e => setWorkFilter({...workFilter, month:e.target.value})}
              style={{padding:"6px 10px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:12,outline:"none",background:"#fff",color:"#1E293B"}}>
              <option value="">전체 기간</option>
              {workMonths.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
            <span className="ml-mono" style={{fontSize:11,color:"#94A3B8",marginLeft:"auto"}}>
              {workStats.count}건 · 총 {fmtHours(workStats.totalHours)}
            </span>
          </div>

          {/* table */}
          <div className="tbl-wrap">
            {loading ? (
              <div style={{padding:40,textAlign:"center",fontSize:13,color:"#64748B"}}>불러오는 중…</div>
            ) : filteredWorks.length === 0 ? (
              <div style={{padding:40,textAlign:"center",fontSize:13,color:"#94A3B8"}}>근무 기록이 없어요.{isAdmin?" 위에서 등록해주세요.":""}</div>
            ) : (
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{background:"#334155",color:"#E2E8F0"}}>
                    <th className="sort-btn" onClick={() => toggleWorkSort("staffId")} style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:4}}>직원 <SortIcon k="staffId" sort={workSort}/></span>
                    </th>
                    <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>매장</th>
                    <th className="sort-btn" onClick={() => toggleWorkSort("startAt")} style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:4}}>출근 <SortIcon k="startAt" sort={workSort}/></span>
                    </th>
                    <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>퇴근</th>
                    <th style={{padding:"10px 14px",textAlign:"center",fontWeight:600,whiteSpace:"nowrap"}}>근무 시간</th>
                    <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>메모</th>
                    {isAdmin && <th style={{padding:"10px 14px",textAlign:"center",fontWeight:600,whiteSpace:"nowrap"}}>관리</th>}
                  </tr>
                </thead>
                <tbody>
                  {filteredWorks.map((w, i) => {
                    const hours = calcHours(w.startAt, w.endAt);
                    const sb2 = storeBadge(w.storeId);
                    const sc = staffColor(w.staffId);
                    return (
                      <tr key={w.id} className={`ml-row ${i%2===0?"even":"odd"}`}>
                        <td style={{padding:"9px 14px"}}>
                          <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
                            <span style={{width:8,height:8,borderRadius:"50%",background:sc,flexShrink:0,display:"inline-block"}}/>
                            <span style={{fontWeight:600,color:"#1E293B"}}>{staffName(w.staffId)}</span>
                          </span>
                        </td>
                        <td style={{padding:"9px 14px"}}>
                          <span className="tag" style={{background:sb2.bg,color:sb2.color}}>{w.storeId}</span>
                        </td>
                        <td className="ml-mono" style={{padding:"9px 14px",fontSize:12,color:"#374151"}}>{fmtDateTime(w.startAt)}</td>
                        <td className="ml-mono" style={{padding:"9px 14px",fontSize:12,color:w.endAt?"#374151":"#94A3B8"}}>
                          {w.endAt ? fmtDateTime(w.endAt) : "미입력"}
                        </td>
                        <td style={{padding:"9px 14px",textAlign:"center"}}>
                          {hours != null
                            ? <span style={{background:"#F0FDF4",color:"#15803D",padding:"2px 10px",borderRadius:999,fontSize:12,fontWeight:600}}>{fmtHours(hours)}</span>
                            : <span style={{color:"#94A3B8",fontSize:12}}>—</span>}
                        </td>
                        <td style={{padding:"9px 14px",color:"#64748B",fontSize:12}}>{w.memo||""}</td>
                        {isAdmin && (
                          <td style={{padding:"9px 14px",textAlign:"center"}}>
                            <div style={{display:"inline-flex",gap:6}}>
                              <button onClick={() => { setEditWork(w); setShowWork(true); }}
                                style={{display:"inline-flex",alignItems:"center",padding:"4px 8px",border:"1px solid #BFDBFE",borderRadius:5,background:"#EFF6FF",color:"#2563EB",cursor:"pointer",fontSize:12}}>
                                <Pencil size={12}/>
                              </button>
                              <button onClick={() => handleDeleteWork(w)}
                                style={{display:"inline-flex",alignItems:"center",padding:"4px 8px",border:"1px solid #FECACA",borderRadius:5,background:"#FEF2F2",color:"#DC2626",cursor:"pointer",fontSize:12}}>
                                <Trash2 size={12}/>
                              </button>
                            </div>
                          </td>
                        )}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
        </div>
      )}

      {/* ════ 재고 주문 탭 ════ */}
      {tab === "order" && (
        <div className="ml-content">
          {/* filters */}
          <div style={{background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",padding:"10px 20px",display:"flex",flexWrap:"wrap",alignItems:"center",gap:10,flexShrink:0}}>
            <select value={orderFilter.store} onChange={e => setOrderFilter({...orderFilter, store:e.target.value})}
              style={{padding:"6px 10px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:12,outline:"none",background:"#fff",color:"#1E293B"}}>
              <option value="all">전체 매장</option>
              {STORES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
            </select>
            <select value={orderFilter.month} onChange={e => setOrderFilter({...orderFilter, month:e.target.value})}
              style={{padding:"6px 10px",border:"1px solid #CBD5E1",borderRadius:6,fontSize:12,outline:"none",background:"#fff",color:"#1E293B"}}>
              <option value="">전체 기간</option>
              {orderMonths.map(m => <option key={m} value={m}>{m}</option>)}
            </select>
            <span className="ml-mono" style={{fontSize:11,color:"#94A3B8",marginLeft:"auto"}}>
              {orderStats.count}건
              {orderStats.totalPrice > 0 && ` · 총 ${orderStats.totalPrice.toLocaleString()}원`}
            </span>
          </div>

          {/* table */}
          <div className="tbl-wrap">
            {loading ? (
              <div style={{padding:40,textAlign:"center",fontSize:13,color:"#64748B"}}>불러오는 중…</div>
            ) : filteredOrders.length === 0 ? (
              <div style={{padding:40,textAlign:"center",fontSize:13,color:"#94A3B8"}}>주문 기록이 없어요.{isAdmin?" 위에서 등록해주세요.":""}</div>
            ) : (
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                <thead>
                  <tr style={{background:"#334155",color:"#E2E8F0"}}>
                    <th className="sort-btn" onClick={() => toggleOrderSort("orderedAt")} style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:4}}>날짜 <SortIcon k="orderedAt" sort={orderSort}/></span>
                    </th>
                    <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>매장</th>
                    <th className="sort-btn" onClick={() => toggleOrderSort("itemName")} style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:4}}>품목 <SortIcon k="itemName" sort={orderSort}/></span>
                    </th>
                    <th style={{padding:"10px 14px",textAlign:"center",fontWeight:600,whiteSpace:"nowrap"}}>수량</th>
                    <th style={{padding:"10px 14px",textAlign:"right",fontWeight:600,whiteSpace:"nowrap"}}>금액</th>
                    <th style={{padding:"10px 14px",textAlign:"left",fontWeight:600,whiteSpace:"nowrap"}}>메모</th>
                    {isAdmin && <th style={{padding:"10px 14px",textAlign:"center",fontWeight:600,whiteSpace:"nowrap"}}>관리</th>}
                  </tr>
                </thead>
                <tbody>
                  {filteredOrders.map((o, i) => {
                    const sb2 = storeBadge(o.storeId);
                    return (
                      <tr key={o.id} className={`ml-row ${i%2===0?"even":"odd"}`}>
                        <td className="ml-mono" style={{padding:"9px 14px",fontSize:12,color:"#374151"}}>{o.orderedAt||"—"}</td>
                        <td style={{padding:"9px 14px"}}>
                          <span className="tag" style={{background:sb2.bg,color:sb2.color}}>{o.storeId}</span>
                        </td>
                        <td style={{padding:"9px 14px",fontWeight:500,color:"#1E293B"}}>{o.itemName}</td>
                        <td style={{padding:"9px 14px",textAlign:"center"}}>
                          <span className="ml-mono" style={{fontSize:12,color:"#374151"}}>{o.qty} {o.unit}</span>
                        </td>
                        <td style={{padding:"9px 14px",textAlign:"right"}}>
                          {o.price != null && o.price !== ""
                            ? <span className="ml-mono" style={{fontSize:12,color:"#1E293B",fontWeight:500}}>{Number(o.price).toLocaleString()}원</span>
                            : <span style={{color:"#94A3B8",fontSize:12}}>—</span>}
                        </td>
                        <td style={{padding:"9px 14px",color:"#64748B",fontSize:12}}>{o.memo||""}</td>
                        {isAdmin && (
                          <td style={{padding:"9px 14px",textAlign:"center"}}>
                            <div style={{display:"inline-flex",gap:6}}>
                              <button onClick={() => { setEditOrder(o); setShowOrder(true); }}
                                style={{display:"inline-flex",alignItems:"center",padding:"4px 8px",border:"1px solid #BFDBFE",borderRadius:5,background:"#EFF6FF",color:"#2563EB",cursor:"pointer",fontSize:12}}>
                                <Pencil size={12}/>
                              </button>
                              <button onClick={() => handleDeleteOrder(o)}
                                style={{display:"inline-flex",alignItems:"center",padding:"4px 8px",border:"1px solid #FECACA",borderRadius:5,background:"#FEF2F2",color:"#DC2626",cursor:"pointer",fontSize:12}}>
                                <Trash2 size={12}/>
                              </button>
                            </div>
                          </td>
                        )}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            )}
          </div>
        </div>
      )}

      {/* modals */}
      {showPin && <PinModal pin={pin} onSuccess={newPin => { setPin(newPin); setMode("admin"); setShowPin(false); }} onClose={() => setShowPin(false)}/>}
      {(showWork || editWork) && <WorkModal record={editWork} onClose={() => { setShowWork(false); setEditWork(null); }} onSave={handleSaveWork}/>}
      {(showOrder || editOrder) && <OrderModal record={editOrder} onClose={() => { setShowOrder(false); setEditOrder(null); }} onSave={handleSaveOrder}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
